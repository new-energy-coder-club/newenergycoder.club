<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Dark background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050507" />
      <stop offset="50%" stop-color="#0c0c12" />
      <stop offset="100%" stop-color="#0f111a" />
    </linearGradient>

    <!-- Grid pattern -->
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(99,102,241,0.08)" stroke-width="1" />
    </pattern>

    <!-- Diagonal energy line gradient -->
    <linearGradient id="energyLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgba(99,102,241,0)" />
      <stop offset="50%" stop-color="rgba(99,102,241,0.6)" />
      <stop offset="100%" stop-color="rgba(99,102,241,0)" />
    </linearGradient>

    <!-- Accent glow -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(99,102,241,0.25)" />
      <stop offset="100%" stop-color="rgba(99,102,241,0)" />
    </radialGradient>

    <!-- Text gradient -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="60%" stop-color="#e2e8f0" />
      <stop offset="100%" stop-color="#94a3b8" />
    </linearGradient>

    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)" />
  <rect width="1200" height="630" fill="url(#grid)" />

  <!-- Ambient glow spots -->
  <circle cx="200" cy="150" r="250" fill="url(#glow)" opacity="0.6" />
  <circle cx="1000" cy="500" r="220" fill="url(#glow)" opacity="0.4" />

  <!-- Diagonal energy lines -->
  <line x1="-100" y1="730" x2="500" y2="130" stroke="url(#energyLine)" stroke-width="2" />
  <line x1="700" y1="630" x2="1300" y2="30" stroke="url(#energyLine)" stroke-width="1.5" opacity="0.6" />

  <!-- Circuit / code decorative frame -->
  <g stroke="rgba(99,102,241,0.3)" stroke-width="1.5" fill="none">
    <!-- Top-left corner bracket -->
    <polyline points="80,80 80,140 140,140" />
    <!-- Top-right corner bracket -->
    <polyline points="1120,80 1120,140 1060,140" />
    <!-- Bottom-left corner bracket -->
    <polyline points="80,550 80,490 140,490" />
    <!-- Bottom-right corner bracket -->
    <polyline points="1120,550 1120,490 1060,490" />
  </g>

  <!-- Small gear / mechanical accents -->
  <g transform="translate(180, 480)" opacity="0.25">
    <circle cx="0" cy="0" r="28" stroke="#6366f1" stroke-width="2" fill="none" />
    <circle cx="0" cy="0" r="18" stroke="#6366f1" stroke-width="2" fill="none" />
    <line x1="-36" y1="0" x2="36" y2="0" stroke="#6366f1" stroke-width="3" />
    <line x1="0" y1="-36" x2="0" y2="36" stroke="#6366f1" stroke-width="3" />
  </g>

  <g transform="translate(1020, 150)" opacity="0.2">
    <rect x="-20" y="-20" width="40" height="40" stroke="#8b5cf6" stroke-width="2" fill="none" transform="rotate(45)" />
    <rect x="-12" y="-12" width="24" height="24" stroke="#8b5cf6" stroke-width="2" fill="none" transform="rotate(45)" />
  </g>

  <!-- Code brackets decoration -->
  <g fill="rgba(99,102,241,0.15)">
    <text x="140" y="300" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="120" font-weight="bold">&lt;/&gt;</text>
  </g>

  <!-- Main headline -->
  <text x="600" y="260" font-family="Inter, 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', Arial, sans-serif" font-size="72" font-weight="800" text-anchor="middle" fill="url(#textGrad)">
    代码诞生于工程现场
  </text>

  <!-- Highlight slash -->
  <g>
    <text x="600" y="350" font-family="Inter, 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', Arial, sans-serif" font-size="72" font-weight="800" text-anchor="middle" fill="url(#accentGrad)">
      而非 PPT
    </text>
    <line x1="430" y1="365" x2="770" y2="365" stroke="#6366f1" stroke-width="3" opacity="0.5" />
  </g>

  <!-- Subtitle -->
  <text x="600" y="440" font-family="Inter, 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', Arial, sans-serif" font-size="28" font-weight="500" text-anchor="middle" fill="#94a3b8" letter-spacing="2">
    NEW ENERGY CODER CLUB
  </text>

  <!-- Bottom tagline -->
  <text x="600" y="500" font-family="Inter, 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', Arial, sans-serif" font-size="20" font-weight="400" text-anchor="middle" fill="#64748b">
    从 200 块生活费到竞赛机器人 · 嵌入式 / ROS / 机械设计
  </text>

  <!-- Corner stats badges -->
  <g transform="translate(80, 560)">
    <rect x="0" y="-24" width="140" height="32" rx="16" fill="rgba(99,102,241,0.12)" stroke="rgba(99,102,241,0.3)" />
    <text x="70" y="-2" font-family="Inter, 'Noto Sans SC', Arial, sans-serif" font-size="14" font-weight="600" text-anchor="middle" fill="#a5b4fc">260+ Commits</text>
  </g>

  <g transform="translate(250, 560)">
    <rect x="0" y="-24" width="130" height="32" rx="16" fill="rgba(139,92,246,0.12)" stroke="rgba(139,92,241,0.3)" />
    <text x="65" y="-2" font-family="Inter, 'Noto Sans SC', Arial, sans-serif" font-size="14" font-weight="600" text-anchor="middle" fill="#c4b5fd">45+ 贡献者</text>
  </g>
</svg>
